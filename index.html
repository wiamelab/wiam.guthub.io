<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Héritage — Wiam</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f9f4ed;
    --champagne: #e8d9c0;
    --gold: #b8924a;
    --gold-light: #d4aa6a;
    --dark: #2a2018;
    --text: #3d3020;
    --muted: #8a7660;
  }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 10%, rgba(184,146,74,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(184,146,74,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 64px;
    position: relative;
  }

  header::before, header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
    width: 320px;
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    letter-spacing: 0.35em;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 88px);
    font-weight: 300;
    line-height: 1.0;
    color: var(--dark);
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .subtitle {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 16px;
    text-transform: uppercase;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  /* Photo card */
  .card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border-radius: 2px;
    background: var(--champagne);
    aspect-ratio: 3/4;
    box-shadow: 0 4px 20px rgba(42,32,24,0.08);
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94),
                box-shadow 0.4s ease;
  }

  .card:nth-child(1) { grid-column: span 2; grid-row: span 2; aspect-ratio: auto; }
  .card:nth-child(6) { grid-column: span 2; aspect-ratio: auto; min-height: 220px; }
  .card:nth-child(13) { grid-column: span 2; aspect-ratio: auto; min-height: 220px; }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 12px 40px rgba(42,32,24,0.16);
    z-index: 2;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }

  .card:hover img { transform: scale(1.05); }

  /* Overlay */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(42,32,24,0.82) 0%, rgba(42,32,24,0.1) 45%, transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 16px;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-cat {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 6px;
    font-weight: 300;
  }

  .card-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: #fff;
    line-height: 1.3;
  }

  /* Gold corner ornament on card #1 */
  .card:first-child::after {
    content: '';
    position: absolute;
    top: 16px;
    right: 16px;
    width: 28px;
    height: 28px;
    border-top: 1.5px solid var(--gold-light);
    border-right: 1.5px solid var(--gold-light);
    opacity: 0.7;
    pointer-events: none;
  }

  /* Number badge */
  .card-num {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 22px;
    height: 22px;
    background: rgba(184,146,74,0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover .card-num { opacity: 1; }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1px solid var(--champagne);
  }

  footer p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(22,16,10,0.94);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    cursor: pointer;
    padding: 40px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-height: 80vh;
    max-width: 90vw;
    object-fit: contain;
    border-radius: 2px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }

  .lightbox-caption {
    color: var(--champagne);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    text-align: center;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    color: var(--gold);
    font-size: 28px;
    cursor: pointer;
    font-weight: 200;
    font-family: 'Jost', sans-serif;
  }

  @media (max-width: 768px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card:nth-child(1) { grid-column: span 2; }
    .page { padding: 40px 20px; }
  }

  /* Entrance animation */
  .card {
    animation: fadeIn 0.7s ease both;
  }
    .card:nth-child(1) { animation-delay: 0.00s; }
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.10s; }
  .card:nth-child(4) { animation-delay: 0.15s; }
  .card:nth-child(5) { animation-delay: 0.20s; }
  .card:nth-child(6) { animation-delay: 0.25s; }
  .card:nth-child(7) { animation-delay: 0.30s; }
  .card:nth-child(8) { animation-delay: 0.35s; }
  .card:nth-child(9) { animation-delay: 0.40s; }
  .card:nth-child(10) { animation-delay: 0.45s; }
  .card:nth-child(11) { animation-delay: 0.50s; }
  .card:nth-child(12) { animation-delay: 0.55s; }
  .card:nth-child(13) { animation-delay: 0.60s; }
  .card:nth-child(14) { animation-delay: 0.65s; }
  .card:nth-child(15) { animation-delay: 0.70s; }
  .card:nth-child(16) { animation-delay: 0.75s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">Une vie construite avec intention</p>
    <h1>Mon <em>Héritage</em></h1>
    <p class="subtitle">Les accomplissements dont je suis fière &nbsp;·&nbsp; Wiam El Abassi</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <p>"Chaque étape est une pierre posée vers la femme que je deviens."</p>
  </footer>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lb-img" src="" alt="">
  <p class="lightbox-caption" id="lb-caption"></p>
</div>

<script>
const PHOTOS = [
  { label: "Diplôme Ingénieur", cat: "🎓 Éducation", src: "photo1.jpg" },
  { label: "Master 2 — Paris XI", cat: "🎓 Éducation", src: "photo2.jpg" },
  { label: "Bienvenue à Paris", cat: "✈️ Aventures", src: "photo3.jpg" },
  { label: "Paix intérieure & lecture", cat: "🌿 Bien-être", src: "photo4.jpg" },
  { label: "Certifications Microsoft & Databricks", cat: "💼 Carrière", src: "photo5.png" },
  { label: "Mission LVMH", cat: "💼 Carrière", src: "photo6.jpg" },
  { label: "Shooting photo", cat: "✨ Épanouissement", src: "photo7.jpg" },
  { label: "Healthy Açaï Bowl", cat: "🌿 Bien-être", src: "photo8.jpg" },
  { label: "Skin Care Routine", cat: "🌿 Bien-être", src: "photo9.jpg" },
  { label: "Coach sportif privée", cat: "💪 Forme & Santé", src: "photo10.jpg" },
  { label: "Stage Acting — Nawell Madani", cat: "✨ Épanouissement", src: "photo11.jpg" },
  { label: "Voyage Monténégro", cat: "✈️ Aventures", src: "photo12.jpg" },
  { label: "Moving to Switzerland", cat: "🏔️ Nouveau Chapitre", src: "photo13.jpg" },
  { label: "Tony Robbins Podcast", cat: "🧠 Croissance personnelle", src: "photo14.jpg" },
  { label: "Voyage à Bali — Déclic", cat: "✈️ Aventures", src: "photo15.jpg" },
  { label: "Shifting in Process", cat: "🧠 Croissance personnelle", src: "photo16.jpg" },
];

const grid = document.getElementById('grid');

PHOTOS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${p.src}" alt="${p.label}" loading="lazy">
    <div class="card-overlay">
      <span class="card-cat">${p.cat}</span>
      <span class="card-label">${p.label}</span>
    </div>
    <span class="card-num">${i+1}</span>
  `;
  card.addEventListener('click', () => openLightbox(p.src, p.label));
  grid.appendChild(card);
});

function openLightbox(src, label) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-caption').textContent = label;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
